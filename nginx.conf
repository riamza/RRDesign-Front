# 1. Blocul SEO: Prinde www.rrdesign.ro si redirectioneaza catre varianta scurta (cu https)
server {
    listen 80;
    server_name www.rrdesign.ro;

    return 301 https://rrdesign.ro$request_uri;
}

# 2. Blocul Principal: Serve?te aplica?ia ta React
server {
    listen 80;
    # (Optional) listen 443 ssl http2; if you manage SSL inside the container directly.
    server_name rrdesign.ro localhost; # Am specificat numele domeniului aici

    # HSTS (Strict-Transport-Security) Header
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Serve static files (React App)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Cache JS, CSS, and other assets for performance (SEO Cache headers)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff2|woff|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
